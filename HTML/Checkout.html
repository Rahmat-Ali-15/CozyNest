<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../CSS/Checkout.css">
    <title>Shipping page</title>
</head>

<body>
    <main>
        <div class="shipping-main-container">
            <div class="shipping-left">
                <div class="shipping-left-content">
                    <div class="shipping-heading">
                        <h1>Create&Barrel</h1>
                        <div>
                            <i class="bi bi-bag-check"></i>
                            <p>Checkout</p>
                        </div>
                    </div>
                    <div class="">
                        <div>
                            <span>1</span>
                            <p>Shipping and Gift Options</p>
                        </div>
                        <span></span>
                        <div>
                            <span>2</span>
                            <p>Payment and Billing</p>
                        </div>
                        <span></span>
                        <div>
                            <span>3</span>
                            <p>Review and Place Order</p>
                        </div>
                    </div>

                    <!-- shipping form -->

                    <form>
                        <h1>Ship To</h1>
                        <div>
                            <div>
                                <div>
                                    <label for="">First Name <span>required</span></label>
                                    <input type="text" id="">
                                </div>
                                <div>
                                    <label for="">Last Name <span>required</span></label>
                                    <input type="text" id="">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label for="">Street Address <span>required</span></label>
                            <input type="text">
                            <a href="#">Add apt, suite or other</a>
                        </div>
                        <div>
                            <div>
                                <label for="">Zip Code <span>required</span></label>
                                <input type="text">
                            </div>
                            <div>
                                <label for="">City <span>required</span></label>
                                <input type="text">
                            </div>
                        </div>
                        <div>
                            <label for="">State <span>required</span></label>
                            <select>
                                <option value="Please Select">Please Select</option>
                                <option value="Andhra Pradesh">Andhra Pradesh</option>
                                <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                <option value="Assam">Assam</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Chhattisgarh">Chhattisgarh</option>
                                <option value="Goa">Goa</option>
                                <option value="Gujarat">Gujarat</option>
                                <option value="Haryana">Haryana</option>
                                <option value="Himachal Pradesh">Himachal Pradesh</option>
                                <option value="Jharkhand">Jharkhand</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Kerala">Kerala</option>
                                <option value="Madhya Pradesh">Madhya Pradesh</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Manipur">Manipur</option>
                                <option value="Meghalaya">Meghalaya</option>
                                <option value="Mizoram">Mizoram</option>
                                <option value="Nagaland">Nagaland</option>
                                <option value="Odisha">Odisha</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Sikkim">Sikkim</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Telangana">Telangana</option>
                                <option value="Tripura">Tripura</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="Uttarakhand">Uttarakhand</option>
                                <option value="West Bengal">West Bengal</option>
                            </select>
                        </div>
                        <div>
                            <label for="">Phone Number <span>required</span></label>
                            <input type="tel" >
                        </div>
                        <div>
                            <button>Next</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="right"></div>
        </div>
    </main>
</body>

</html>
